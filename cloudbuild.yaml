steps:
  # Build container image with Dockerfile (avoid buildpack detection/trust issues)
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - -t
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

  # Run DB migrations BEFORE deploying new revision
  - name: node:20-bullseye
    id: Migrate
    entrypoint: bash
    args:
      - -c
      - |
          set -euo pipefail

          cd /workspace
          test -f package.json
          test -f prisma/schema.prisma

          npm ci --no-audit --no-fund

          cleanup() {
            if [ -n "$${PROXY_PID:-}" ]; then
              kill "$${PROXY_PID}" || true
              wait "$${PROXY_PID}" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          apt-get update && apt-get install -y curl ca-certificates && rm -rf /var/lib/apt/lists/*
          curl -fsSL -o /usr/local/bin/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.10.0/cloud-sql-proxy.linux.amd64
          chmod +x /usr/local/bin/cloud-sql-proxy

          /usr/local/bin/cloud-sql-proxy "inventory-dev-kwxbav:asia-east1:daily-performance-system" --port 5432 &
          PROXY_PID=$$!

          for i in {1..40}; do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && break || true
            sleep 0.5
          done
          (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 || {
            echo "Cloud SQL Proxy not ready on 127.0.0.1:5432" 1>&2
            exit 1
          }

          export DATABASE_URL="postgresql://postgres:q%5b%2b%3b)%2btY%2fXHUJ3pJ@127.0.0.1:5432/neondb_owner"

          cat > /workspace/migrate_prep.js <<'NODE'
          const { PrismaClient } = require("@prisma/client");

          const MIGRATION = "20260416000000_use_date_for_calendar_fields";
          const INDEX_NAME = "RevenueRecord_revenueDate_storeId_key";

          async function main() {
            const prisma = new PrismaClient();
            try {
              console.log("=== _prisma_migrations (target migration) ===");
              const migRows = await prisma.$queryRawUnsafe(
                "SELECT migration_name, started_at, finished_at, rolled_back_at, logs " +
                  "FROM _prisma_migrations WHERE migration_name = '" +
                  MIGRATION.replace(/'/g, "''") +
                  "' LIMIT 1"
              );
              console.log(JSON.stringify(migRows, null, 2));

              console.log("=== pg_indexes (index definition) ===");
              const indexRows = await prisma.$queryRawUnsafe(
                "SELECT indexname, indexdef FROM pg_indexes WHERE schemaname = 'public' AND indexname = '" +
                  INDEX_NAME.replace(/'/g, "''") +
                  "'"
              );
              console.log(JSON.stringify(indexRows, null, 2));

              console.log("=== information_schema: RevenueRecord.revenueDate ===");
              const colRows = await prisma.$queryRawUnsafe(
                "SELECT table_name, column_name, data_type FROM information_schema.columns " +
                  "WHERE table_schema = 'public' AND table_name = 'RevenueRecord' AND column_name = 'revenueDate'"
              );
              console.log(JSON.stringify(colRows, null, 2));

              console.log("=== DROP INDEX IF EXISTS ===");
              await prisma.$executeRawUnsafe(
                'DROP INDEX IF EXISTS "RevenueRecord_revenueDate_storeId_key";'
              );
              console.log("DROP INDEX completed.");
            } finally {
              await prisma.$disconnect();
            }
          }

          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

          node /workspace/migrate_prep.js

          cat > /workspace/should_resolve_rolled_back.js <<'NODE'
          const { PrismaClient } = require("@prisma/client");

          const MIGRATION = "20260416000000_use_date_for_calendar_fields";
          /** exit 0 = failed/incomplete, run resolve --rolled-back; exit 10 = skip; exit 1 = error */
          const EXIT_NEED_RESOLVE = 0;
          const EXIT_SKIP = 10;

          async function main() {
            const prisma = new PrismaClient();
            try {
              const rows = await prisma.$queryRawUnsafe(
                "SELECT finished_at, rolled_back_at FROM _prisma_migrations WHERE migration_name = '" +
                  MIGRATION.replace(/'/g, "''") +
                  "' LIMIT 1"
              );
              const row = Array.isArray(rows) && rows.length ? rows[0] : null;
              console.log("=== resolve --rolled-back gate (_prisma_migrations) ===");
              console.log(JSON.stringify(row, null, 2));

              if (!row) {
                console.log("No row for this migration; skip resolve --rolled-back.");
                process.exit(EXIT_SKIP);
              }

              const failedIncomplete =
                row.finished_at == null && row.rolled_back_at == null;

              if (failedIncomplete) {
                console.log(
                  "finished_at and rolled_back_at are both null (failed/incomplete); will run resolve --rolled-back."
                );
                process.exit(EXIT_NEED_RESOLVE);
              }

              console.log(
                "Migration not in failed/incomplete state; skip resolve --rolled-back."
              );
              process.exit(EXIT_SKIP);
            } finally {
              await prisma.$disconnect();
            }
          }

          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

          set +e
          node /workspace/should_resolve_rolled_back.js
          RESOLVE_GATE_RC=$$?
          set -e

          if [ "$${RESOLVE_GATE_RC:-1}" -eq 0 ]; then
            npx prisma migrate resolve --rolled-back 20260416000000_use_date_for_calendar_fields
          elif [ "$${RESOLVE_GATE_RC:-1}" -eq 10 ]; then
            echo "Skipping: prisma migrate resolve --rolled-back (migration not in failed/incomplete state)."
          else
            exit "$${RESOLVE_GATE_RC:-1}"
          fi

          npx prisma migrate deploy
          npm run db:sync-permissions

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - --platform=managed
      - --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
      - --region=$_DEPLOY_REGION
      - --quiet

images:
  - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

